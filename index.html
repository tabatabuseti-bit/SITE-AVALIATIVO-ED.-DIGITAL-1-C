<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmatamento - Conscientização</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho -->
    <header role="banner">
        <div class="container">
            <h1 id="site-title">Desmatamento: Preserve Nossas Florestas</h1>
            <nav aria-label="Menu principal">
                <ul class="nav-links">
                    <li><a href="#sobre">Sobre</a></li>
                    <li><a href="#impactos">Impactos</a></li>
                    <li><a href="#galeria">Galeria</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
            </nav>
            <button id="contrast-toggle" aria-label="Ativar modo alto contraste">Alto Contraste</button>
            <button id="increase-font" aria-label="Aumentar tamanho da fonte">A+</button>
            <button id="decrease-font" aria-label="Diminuir tamanho da fonte">A-</button>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        <!-- Seção Sobre -->
        <section id="sobre" aria-labelledby="sobre-title">
            <h2 id="sobre-title">Sobre o Desmatamento</h2>
            <p>O desmatamento é um problema ambiental crítico que afeta ecossistemas, clima e biodiversidade.</p>
        </section>

        <!-- Seção Impactos -->
        <section id="impactos" aria-labelledby="impactos-title">
            <h2 id="impactos-title">Impactos</h2>
            <div id="impact-cards" class="cards-container">
                <!-- Cards serão inseridos dinamicamente via JS -->
            </div>
        </section>

        <!-- Seção Galeria (Carrossel) -->
        <section id="galeria" aria-labelledby="galeria-title">
            <h2 id="galeria-title">Galeria</h2>
            <div class="carousel-container">
                <button class="carousel-btn prev" aria-label="Imagem anterior">&#10094;</button>
                <div class="carousel-track">
                    <!-- Slides gerados dinamicamente via JS -->
                </div>
                <button class="carousel-btn next" aria-label="Próxima imagem">&#10095;</button>
            </div>
        </section>

        <!-- Seção FAQ (Acordeão) -->
        <section id="faq" aria-labelledby="faq-title">
            <h2 id="faq-title">Perguntas Frequentes</h2>
            <div id="faq-container">
                <!-- Itens do acordeão gerados via JS -->
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer role="contentinfo" id="contato">
        <p>&copy; 2026 Desmatamento. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
